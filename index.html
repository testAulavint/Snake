<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake Game</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=play_circle"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="score">score: <span class="score--value">00</span></div>

    <div class="menu-screen">
      <span class="gameOver">Game Over</span>
      <span class="final-score">score <span>00</span></span>

      <button class="btn-play">
        <span class="material-symbols-outlined"> play_circle </span> Jogar
        novamente

    </div>

    <canvas class="canvas" width="600" height="600"></canvas>

    <script src="/js/script.js"></script>
  </body>
</html>
